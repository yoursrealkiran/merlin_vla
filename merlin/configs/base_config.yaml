experiment_name: "merlin_vla_rlds_real"

seed: 42
use_wandb: true

data:
  dataset_name: "RLDS_Robotic_Dataset"
  rlds_path: "path/to/your/rlds_folder"  # Directory containing TFRecord files
  image_size: [224, 224]                # Standard VLA resolution
  use_depth: false
  max_instruction_len: 64
  batch_size: 32                        # Reduced batch size for larger images
  num_workers: 8

model:
  d_model: 256
  n_heads: 4
  num_layers: 4
  mlp_dim: 512
  dropout: 0.1
  # With 224x224 input and ConvStem/Patch logic, adjust tokens accordingly
  max_image_tokens: 256        
  max_text_tokens: 64 
  text_model_name: "t5-small"
  freeze_text_encoder: true
  proprio_dim: 6               # Standard for 6-DOF robot state
  action_dim: 7                # Standard for 6-DOF + 1 gripper action

train:
  num_epochs: 50
  lr: 0.0001
  weight_decay: 0.05           # Increased for better generalization
  warmup_steps: 2000
  max_steps: 100000            # RLDS training usually requires more steps
  grad_clip_norm: 1.0
  log_every: 100
  val_every: 1000
  save_every: 5000
  output_dir: "checkpoints/merlin_vla_rlds"